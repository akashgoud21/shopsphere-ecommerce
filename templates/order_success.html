{% extends 'base.html' %}
{% block title %}Order Success{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="success-box shadow-lg mx-auto p-5 rounded-4">
        <h1 class="display-5 fw-bold text-success">Order Placed Successfully!</h1>
        <p class="lead mt-3">Your order has been placed successfully.</p>
        <h4 class="mb-4">Order ID: #{{ order_id }}</h4>
        <a href="{{ url_for('my_orders') }}" class="btn btn-primary btn-lg">View My Orders</a>
    </div>
</div>
{% endblock %}
